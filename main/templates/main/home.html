<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Resource Explorer</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
      }

      .container {
        display: flex;
        width: 100%;
        height: 100%;
      }

      .left-section {
        width: 450px;
        background-color: #f5f5f5;
        padding: 20px;
        box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      }

      .left-section h2 {
        margin-bottom: 20px;
        color: #333;
        font-size: 20px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-size: 14px;
        font-weight: bold;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        font-family: Arial, sans-serif;
      }

      .form-group input:focus {
        outline: none;
        border-color: #4CAF50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
      }

      button {
        padding: 10px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .load-btn {
        background-color: #2196F3;
        color: white;
        /* margin-top: 10px; */
        width: 100%;
      }

      .load-btn:hover {
        background-color: #0b7dda;
      }

      .load-btn:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      .sites-list {
        background-color: white;
        border-radius: 4px;
        padding: 0;
        margin-bottom: 20px;
        max-height: 275px;
        overflow-y: auto;
      }

      .sites-list h3 {
        padding: 15px;
        margin: 0;
        color: #333;
        font-size: 16px;
        background-color: #e9e9e9;
        border-bottom: 1px solid #ddd;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .site-item {
        padding: 10px 12px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #333;
        gap: 10px;
      }

      .site-item:last-child {
        border-bottom: none;
      }

      .site-item-status {
        flex: 0 0 24px;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .status-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #2196F3;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .status-success {
        color: #4CAF50;
        font-size: 20px;
      }

      .status-error {
        color: #FFA500;
        font-size: 20px;
      }

      .site-item-text {
        flex: 1;
        word-break: break-word;
        font-size: 14px;
      }

      .remove-btn {
        background-color: white;
        color: #999;
        padding: 0;
        margin-left: 10px;
        font-size: 24px;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        cursor: pointer;
        border: none;
        transition: color 0.2s ease;
        flex: 0 0 34px;
      }

      .remove-btn:hover {
        background-color: white;
        color: #d32f2f;
      }

      #map {
        flex: 1;
        width: 100%;
        height: 100%;
      }

      .counter {
        font-size: 12px;
        color: #888;
        text-align: right;
      }

      .input-container {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 15px;
        background-color: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 5px;
      }

      .input-container input {
        flex: 1;
        border: none;
        padding: 10px;
        font-size: 14px;
        font-family: Arial, sans-serif;
      }

      .input-container input:focus {
        outline: none;
        box-shadow: none;
      }

      .add-btn-plus {
        background-color: transparent;
        color: #4CAF50;
        border: none;
        padding: 8px 12px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        transition: color 0.3s;
        flex-shrink: 0;
      }

      .add-btn-plus:hover {
        color: #45a049;
      }

      .add-btn-plus:disabled {
        color: #ccc;
        cursor: not-allowed;
      }

      .error-message {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        border-radius: 4px;
        padding: 12px;
        margin-bottom: 15px;
        font-size: 14px;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      .geocoding-results {
        background-color: white;
        border-radius: 4px;
        padding: 0;
        margin-bottom: 20px;
        margin-top: 20px;
      }

      .geocoding-results h3 {
        padding: 15px;
        margin: 0;
        color: #333;
        font-size: 16px;
        background-color: #e9e9e9;
        border-bottom: 1px solid #ddd;
      }

      .geocoding-result-item {
        padding: 12px 15px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
      }

      .geocoding-result-item:last-child {
        border-bottom: none;
      }

      .geocoding-result-item.success {
        color: #155724;
        background-color: #d4edda;
        border: 1px solid #c3e6cb;
        margin: 8px 15px;
        padding: 12px;
        border-radius: 4px;
      }

      .geocoding-result-item.error {
        color: #721c24;
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
        margin: 8px 15px;
        padding: 12px;
        border-radius: 4px;
      }

      .geocoding-result-item.loading {
        color: #856404;
        background-color: #fff3cd;
      }

      .result-address {
        font-weight: bold;
        margin-bottom: 4px;
      }

      .result-message {
        font-size: 13px;
        margin-top: 4px;
      }

      .error-messages-section {
        background-color: white;
        border-radius: 4px;
        padding: 0;
        margin-bottom: 15px;
        display: none;
      }

      .error-messages-section.show {
        display: block;
      }

      .error-messages-section h3 {
        padding: 15px;
        margin: 0;
        color: #721c24;
        font-size: 14px;
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
        border-bottom: none;
        border-radius: 4px 4px 0 0;
      }

      .error-message-item {
        padding: 10px 15px;
        border-bottom: 1px solid #f5c6cb;
        font-size: 13px;
        color: #721c24;
        background-color: #f8d7da;
      }

      .error-message-item:last-child {
        border-bottom: none;
        border-radius: 0 0 4px 4px;
      }

      .site-details-section {
        max-height: 400px;
        overflow-y: auto;
        background-color: white;
        border-radius: 4px;
        padding: 0;
        margin-top: 15px;
        margin-bottom: 15px;
        display: none;
        border: 1px solid #e0e0e0;
      }

      .site-details-section.show {
        display: block;
      }

      .site-details-section h3 {
        padding: 15px;
        margin: 0;
        color: #333;
        font-size: 16px;
        background-color: white;
        border: none;
        border-bottom: 1px solid #e0e0e0;
        border-radius: 4px 4px 0 0;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .site-detail-item {
        padding: 12px 15px;
        border-bottom: 1px solid #e0e0e0;
        font-size: 14px;
        color: #333;
        background-color: white;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .site-detail-content {
        flex: 1;
      }

      .site-detail-button {
        background-color: #FF9800;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s ease;
        margin-top: 8px;
        display: inline-block;
      }

      .site-detail-button:hover {
        background-color: #F57C00;
      }

      .site-detail-item:hover {
        background-color: #f0f0f0;
      }

      .site-detail-item:last-child {
        border-bottom: none;
        border-radius: 0 0 4px 4px;
      }

      .site-detail-row {
        margin-bottom: 8px;
      }

      .site-detail-row:last-child {
        margin-bottom: 0;
      }

      .site-detail-label {
        font-weight: bold;
        color: #155724;
      }

      .site-detail-value {
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left-section">
        <h2>Solar Resource Explorer</h2>
        
        <!-- Enter site address form -->
        <form id="addressForm">
          <div class="input-container">
            <input 
              type="text" 
              id="addressInput" 
              placeholder="Enter site address..." 
              required
            />
            <button type="button" id="addBtn" class="add-btn-plus">+</button>
          </div>

          <div id="errorMessage" class="error-message"></div>
        </form>
        
        <!-- Sites Added List -->
        <div class="sites-list" id="sitesList" style="display: none;">
          <h3 style="display: flex; justify-content: space-between; align-items: center;">
            Sites Added 
            <span class="counter"><span id="siteCount">0</span>/10 | Min 5</span>
          </h3>
          <div id="sitesContainer"></div>
        </div>
        
        <!-- Site Addition Error Messaging -->
        <div class="error-messages-section" id="errorMessagesSection">
          <div id="errorMessagesContainer"></div>
        </div>

        <button id="loadSitesBtn" class="load-btn" disabled>Load Sites</button>
        
        <!-- Loaded Site Details List -->
        <div class="site-details-section" id="siteDetailsSection">
          <h3>Results</h3>
          <div id="siteDetailsContainer"></div>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <!-- Leaflet JS for map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    
    <script>

      // Initialize map centered on the United States
      const map = L.map('map').setView([39.8283, -98.5795], 4);

      // Add OpenStreetMap tile layer
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
        referrerPolicy: 'strict-origin-when-cross-origin'
      }).addTo(map);

      // Address management
      const MAX_SITES = 10;
      let sites = [];

      const addressInput = document.getElementById('addressInput');
      const addBtn = document.getElementById('addBtn');
      const loadSitesBtn = document.getElementById('loadSitesBtn');
      const sitesList = document.getElementById('sitesList');
      const sitesContainer = document.getElementById('sitesContainer');
      const siteCount = document.getElementById('siteCount');
      const addressForm = document.getElementById('addressForm');
      const errorMessage = document.getElementById('errorMessage');
      const errorMessagesSection = document.getElementById('errorMessagesSection');
      const errorMessagesContainer = document.getElementById('errorMessagesContainer');
      const siteDetailsSection = document.getElementById('siteDetailsSection');
      const siteDetailsContainer = document.getElementById('siteDetailsContainer');

      // Track geocoding status for each site
      let geocodingStatus = {};
      let successfulSites = [];

      // Function to show error message
      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.add('show');
      }

      // Function to clear error message
      function clearError() {
        errorMessage.textContent = '';
        errorMessage.classList.remove('show');
      }

      // Clear error when user types in the input
      addressInput.addEventListener('input', clearError);

      // Prevent form submission
      addressForm.addEventListener('submit', function(e) {
        e.preventDefault();
      });
      
      // Add site button click handler
      addBtn.addEventListener('click', function() {
        const address = addressInput.value.trim();

        if (!address) {
          showError('Please enter an address');
          return;
        }

        if (sites.length >= MAX_SITES) {
          showError(`Maximum ${MAX_SITES} sites allowed`);
          return;
        }

        clearError();
        sites.push(address);
        addressInput.value = '';
        updateSitesList();
      });

      // Update sites list on UI
      function updateSitesList() {
        siteCount.textContent = sites.length;
        
        if (sites.length > 0) {
          sitesList.style.display = 'block';  // Load the sites list container if there is at least one site
        } else {
          sitesList.style.display = 'none'; // Hide the sites list container if there are no sites
        }
        
        // Enable load button only if 5 or more sites are added
        loadSitesBtn.disabled = sites.length < 5;

        // Add sites to the list in the UI
        sitesContainer.innerHTML = '';
        sites.forEach((site, index) => {
          const siteItem = document.createElement('div');
          siteItem.className = 'site-item';
          siteItem.setAttribute('data-site-index', index);
          
          const statusDiv = document.createElement('div');
          statusDiv.className = 'site-item-status';
          statusDiv.setAttribute('id', `status-${index}`);
          statusDiv.innerHTML = '';
          
          const textSpan = document.createElement('span');
          textSpan.className = 'site-item-text';
          textSpan.textContent = site;
          
          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'remove-btn';
          removeBtn.onclick = function() { removeSite(index); };
          removeBtn.textContent = '×';
          removeBtn.title = 'Remove site';
          
          siteItem.appendChild(statusDiv);
          siteItem.appendChild(textSpan);
          siteItem.appendChild(removeBtn);
          sitesContainer.appendChild(siteItem);
        });

        addBtn.disabled = sites.length >= MAX_SITES;
      }

      // Remove site function
      function removeSite(index) {
        sites.splice(index, 1);
        delete geocodingStatus[index];
        updateSitesList();
      }

      // Update status indicator for a site
      function updateSiteStatus(index, status) {
        const statusDiv = document.getElementById(`status-${index}`);
        if (!statusDiv) return;

        if (status === 'loading') {
          statusDiv.innerHTML = '<div class="status-spinner"></div>';
        } else if (status === 'success') {
          statusDiv.innerHTML = '<span class="status-success">✓</span>';
        } else if (status === 'error') {
          statusDiv.innerHTML = '<span class="status-error">⚠</span>';
        }
      }

      // Center map on site marker
      function centerMapOnSite(latitude, longitude) {
        map.setView([latitude, longitude], 15);
        return false;
      }

      // Geocode address function
      async function geocodeAddress(address) {
        try {
          const response = await fetch(`/api/geocode/search?address=${encodeURIComponent(address)}`);
          const data = await response.json();
          
          if (response.status === 404) {
            return {
              success: false,
              error: 'We could not find a location for this address. Please check the address and try again.'
            };
          }
          
          if (!response.ok) {
            return {
              success: false,
              error: data.detail || 'Unknown error occurred'
            };
          }
          
          return {
            success: true,
            data: data
          };
        } catch (error) {
          return {
            success: false,
            error: error.message || 'Network error'
          };
        }
      }

      // Load sites button click handler
      loadSitesBtn.addEventListener('click', async function() {
        loadSitesBtn.disabled = true;
        geocodingStatus = {};
        successCount = 0;
        successfulSites = [];
        errorMessagesContainer.innerHTML = '';
        errorMessagesSection.classList.remove('show');
        siteDetailsContainer.innerHTML = '';
        siteDetailsSection.classList.remove('show');

        // Process each site sequentially
        for (let i = 0; i < sites.length; i++) {
          const address = sites[i];
          
          // Show loading spinner
          updateSiteStatus(i, 'loading');
          geocodingStatus[i] = 'loading';

          // Geocode the address
          const result = await geocodeAddress(address);

          // Update status based on result
          if (result.success) {
            updateSiteStatus(i, 'success');
            geocodingStatus[i] = 'success';
            successCount++;
            
            // Store successful site details
            successfulSites.push({
              address: address,
              latitude: result.data.latitude,
              longitude: result.data.longitude,
              ...result.data  // Include all response data
            });
            
            // Add marker to map
            const { latitude, longitude } = result.data;
            L.marker([latitude, longitude]).addTo(map)
              .bindPopup(`
                <strong>${address}</strong>
                <br>Lat: ${latitude.toFixed(4)}, Lon: ${longitude.toFixed(4)}
                <a href="/solar-resource-detail?address=${encodeURIComponent(address)}&latitude=${latitude}&longitude=${longitude}" target="_blank" style="display: block; margin-top: 5px; color: #2196F3; text-decoration: none;">View Solar Resource Data</a>`)
              .openPopup();

          } else {
            updateSiteStatus(i, 'error');
            geocodingStatus[i] = 'error';
            
            // Add error message
            const errorItem = document.createElement('div');
            errorItem.className = 'error-message-item';
            errorItem.innerHTML = `<strong>${address}:</strong> ${result.error}`;
            errorMessagesContainer.appendChild(errorItem);
          }
        }

        // Display successful sites details
        if (successfulSites.length > 0) {
          siteDetailsContainer.innerHTML = '';
          successfulSites.forEach((site, index) => {
            const siteDetail = document.createElement('div');
            siteDetail.className = 'site-detail-item';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'site-detail-content';
            
            const addressRow = document.createElement('div');
            addressRow.className = 'site-detail-row';
            addressRow.innerHTML = `<div class="site-detail-label">${site.address}</div>`;
            
            const latitudeRow = document.createElement('div');
            latitudeRow.className = 'site-detail-row';
            latitudeRow.innerHTML = `<span class="site-detail-label">Latitude: </span><span class="site-detail-value">${site.latitude.toFixed(2)}</span>`;
            
            const longitudeRow = document.createElement('div');
            longitudeRow.className = 'site-detail-row';
            longitudeRow.innerHTML = `<span class="site-detail-label">Longitude: </span><span class="site-detail-value">${site.longitude.toFixed(2)}</span>`;
            
            const buttonRow = document.createElement('div');
            buttonRow.className = 'site-detail-row';

            const viewDataBtn = document.createElement('button');
            viewDataBtn.className = 'site-detail-button';
            viewDataBtn.textContent = 'View Solar Resource Data';
            viewDataBtn.addEventListener('click', function(e) {
              e.stopPropagation();
              const detailUrl = `/solar-resource-detail?address=${encodeURIComponent(site.address)}&latitude=${site.latitude}&longitude=${site.longitude}`;
              window.open(detailUrl, '_blank');
            });
            buttonRow.appendChild(viewDataBtn);
            
            contentDiv.appendChild(addressRow);
            contentDiv.appendChild(latitudeRow);
            contentDiv.appendChild(longitudeRow);
            contentDiv.appendChild(buttonRow);
            
            siteDetail.appendChild(contentDiv);
            
            siteDetail.addEventListener('click', function() {
              centerMapOnSite(site.latitude, site.longitude);
            });
            siteDetailsContainer.appendChild(siteDetail);
          });
          siteDetailsSection.classList.add('show');
        }

        if (successCount !== sites.length) {
          errorMessagesSection.classList.add('show');
        }

        // Re-enable the button
        loadSitesBtn.disabled = false;
      });
    </script>
  </body>
</html>
