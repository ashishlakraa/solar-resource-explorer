<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #eaf3ff, #ffffff);
        color: #1f2937;
      }

      .card {
        padding: 3rem 4rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 3rem;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello World</h1>
    </main>
  </body>
</html>
